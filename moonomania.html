<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moonomania</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;overflow:hidden;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;width:100vw;height:100vh;}
#game-container{position:relative;width:min(100vw,100vh);height:min(100vw,100vh);max-width:600px;max-height:600px;border-radius:12px;overflow:hidden;}
#screen-intro{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:0;}
#bg-img{position:absolute;inset:0;background-size:cover;background-position:center center;}
#bg-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.0) 0%,rgba(0,0,0,0.0) 40%,rgba(0,0,0,0.55) 65%,rgba(0,0,0,0.88) 100%);}
#intro-content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;margin-top:-5%;}
#game-title{font-family:'Georgia',serif;font-size:clamp(36px,9vmin,72px);font-weight:bold;letter-spacing:0.12em;text-transform:uppercase;background:linear-gradient(135deg,#c8a02a 0%,#ffe680 35%,#c8a02a 60%,#fff3a0 80%,#c8a02a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 18px rgba(255,210,60,0.55));margin-bottom:4px;}
#title-sub{color:rgba(255,255,255,0.5);font-size:clamp(9px,1.8vmin,13px);letter-spacing:0.4em;text-transform:uppercase;margin-bottom:28px;}
.menu-btn{display:block;width:clamp(180px,40vmin,240px);padding:clamp(10px,2.2vmin,14px) 0;margin:7px 0;text-align:center;font-family:'Georgia',serif;font-size:clamp(13px,2.8vmin,17px);letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;border:1.5px solid rgba(200,160,42,0.65);color:#f5d76e;background:rgba(0,0,0,0.48);backdrop-filter:blur(6px);border-radius:3px;transition:all 0.2s;user-select:none;}
.menu-btn:hover{background:rgba(200,160,42,0.18);border-color:#f5d76e;color:#fff;transform:scale(1.03);}
.menu-btn:active{transform:scale(0.97);}
#screen-game{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:#111;}
#game-ui{position:absolute;top:12px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 16px;z-index:20;pointer-events:none;}
#score-box{color:#f5d76e;font-family:'Georgia',serif;font-size:14px;letter-spacing:0.06em;}
#back-btn{pointer-events:all;background:rgba(0,0,0,0.6);border:1px solid rgba(200,160,42,0.45);color:#f5d76e;font-size:12px;letter-spacing:0.1em;padding:5px 12px;border-radius:3px;cursor:pointer;font-family:'Georgia',serif;}
#back-btn:hover{background:rgba(200,160,42,0.18);}
canvas{display:block;width:100%;height:100%;}
#game-msg{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);color:#f5d76e;font-family:'Georgia',serif;font-size:15px;letter-spacing:0.08em;text-align:center;pointer-events:none;white-space:nowrap;text-shadow:0 0 10px rgba(255,210,60,0.7);}
#hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.28);font-size:11px;letter-spacing:0.1em;pointer-events:none;white-space:nowrap;}

/* Oznámení o městě — velké, přes střed */
#city-announce{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.6);
  background:rgba(10,5,25,0.92);
  border:2px solid rgba(200,160,42,0.9);
  color:#ffe680;
  font-family:'Georgia',serif;
  text-align:center;
  padding:18px 36px 14px;
  border-radius:8px;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.25s, transform 0.25s;
  z-index:40;
  white-space:nowrap;
  box-shadow:0 0 40px rgba(200,160,42,0.35);
}
#city-announce.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
#city-emoji{font-size:32px;line-height:1.1;display:block;margin-bottom:4px;}
#city-name{font-size:26px;font-weight:bold;letter-spacing:0.12em;display:block;}
#city-sub{font-size:11px;letter-spacing:0.3em;color:rgba(255,220,100,0.6);margin-top:4px;display:block;text-transform:uppercase;}

/* Flash overlay při průjezdu městem */
#city-flash{
  position:absolute;inset:0;
  background:rgba(200,160,42,0.0);
  pointer-events:none;z-index:35;
  transition:background 0.1s;
}

/* Progress bar */
#route-bar{position:absolute;left:10px;bottom:48px;width:22px;height:180px;background:rgba(0,0,0,0.55);border:1px solid rgba(200,160,42,0.4);border-radius:11px;z-index:25;overflow:hidden;}
#route-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,#c8a02a,#ffe680);border-radius:11px;transition:height 0.5s;}
#route-label-start{position:absolute;left:36px;bottom:44px;color:rgba(255,255,255,0.45);font-size:10px;font-family:'Georgia',serif;letter-spacing:0.05em;z-index:25;}
#route-label-end{position:absolute;left:36px;bottom:222px;color:#f5d76e;font-size:10px;font-family:'Georgia',serif;letter-spacing:0.05em;z-index:25;}

#screen-settings{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);z-index:50;}
#settings-box{border:1.5px solid rgba(200,160,42,0.45);padding:32px 44px;border-radius:8px;text-align:center;color:#f5d76e;font-family:'Georgia',serif;}
#settings-box h2{font-size:24px;letter-spacing:0.15em;margin-bottom:24px;color:#ffe680;}
.setting-row{display:flex;align-items:center;justify-content:space-between;gap:28px;margin:12px 0;font-size:14px;letter-spacing:0.07em;}
.toggle{width:44px;height:22px;background:#333;border-radius:11px;position:relative;cursor:pointer;border:1px solid rgba(200,160,42,0.4);}
.toggle.on{background:rgba(200,160,42,0.45);}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#f5d76e;border-radius:50%;top:2px;left:2px;transition:left 0.2s;}
.toggle.on::after{left:24px;}
</style>
</head>
<body>
<div id="game-container">
  <div id="screen-intro">
    <div id="bg-img"></div>
    <div id="bg-overlay"></div>
    <div id="intro-content">
      <div id="game-title">Moonomania</div>
      <div id="title-sub">Prešov → Praha</div>
      <button class="menu-btn" id="btn-start">&#9654;&nbsp;&nbsp;Spustit hru</button>
      <button class="menu-btn" id="btn-settings-open">&#9881;&nbsp;&nbsp;Nastavení</button>
      <button class="menu-btn" id="btn-quit">&#10005;&nbsp;&nbsp;Ukončit hru</button>
    </div>
  </div>

  <div id="screen-game">
    <div id="game-ui">
      <div id="score-box">Skóre: <span id="score">0</span> &nbsp;|&nbsp; Nejlepší: <span id="best">0</span></div>
      <button id="back-btn" onclick="goToMenu()">&#8592; Menu</button>
    </div>
    <canvas id="c" width="480" height="600"></canvas>
    <div id="city-flash"></div>
    <div id="city-announce">
      <span id="city-emoji"></span>
      <span id="city-name"></span>
      <span id="city-sub">průjezd</span>
    </div>
    <div id="route-bar"><div id="route-fill" style="height:0%"></div></div>
    <div id="route-label-start">Prešov</div>
    <div id="route-label-end">&#127937; Praha</div>
    <div id="game-msg"></div>
    <div id="hint">&#8592; &#8594; A D = zatáčení &nbsp;|&nbsp; &#8593; W = rychleji &nbsp;|&nbsp; Mezerník = start/pokračovat</div>
  </div>

  <div id="screen-settings">
    <div id="settings-box">
      <h2>&#9881; Nastavení</h2>
      <div class="setting-row"><span>Zvukové efekty</span><div class="toggle" id="toggle-sound"></div></div>
      <div class="setting-row"><span>Vibrace (mobil)</span><div class="toggle" id="toggle-vibration"></div></div>
      <div class="setting-row"><span>Noční režim UI</span><div class="toggle on" id="toggle-dark"></div></div>
      <button class="menu-btn" id="settings-close" style="width:170px;margin-top:24px;">Zpět</button>
    </div>
  </div>
</div>

}

// ══════════════════════════════════════════════════
const ROUTE = [
  { name:'Prešov',            emoji:'🏁', score:0     },
  { name:'Poprad',            emoji:'🏔️', score:1000  },
  { name:'Žilina',            emoji:'🏙️', score:3500  },
  { name:'Trenčín',           emoji:'🏰', score:6000  },
  { name:'Brno',              emoji:'🍷', score:9000  },
  { name:'Praha',             emoji:'🏆', score:12000 },
];
const SCORE_GOAL = 12000;
let nextCityIdx = 1;

// Oznámení
const announceEl = document.getElementById('city-announce');
const emojiEl    = document.getElementById('city-emoji');
const nameEl     = document.getElementById('city-name');
const flashEl    = document.getElementById('city-flash');
let announceTimeout = null;
let flashTimeout    = null;

function showCity(city, isGoal){
  emojiEl.textContent = city.emoji;
  nameEl.textContent  = city.name;
  document.getElementById('city-sub').textContent = isGoal ? '🎉 cíl!' : 'průjezd';
  announceEl.classList.add('show');
  if(announceTimeout) clearTimeout(announceTimeout);
  announceTimeout = setTimeout(()=>announceEl.classList.remove('show'), isGoal ? 99999 : 2500);

  // Zlatý flash přes celou obrazovku
  flashEl.style.transition='none';
  flashEl.style.background='rgba(200,160,42,0.28)';
  if(flashTimeout) clearTimeout(flashTimeout);
  flashTimeout = setTimeout(()=>{
    flashEl.style.transition='background 0.6s';
    flashEl.style.background='rgba(200,160,42,0)';
  }, 80);
}

function updateRouteBar(s){
  document.getElementById('route-fill').style.height = Math.min(100,(s/SCORE_GOAL)*100)+'%';
}

const msgEl=document.getElementById('game-msg');
const RL=70, RR=410, RW=RR-RL, LW=RW/3;

// Středy pruhů (pro algoritmus generování aut)
const LANES = [RL+LW*0.5+19, RL+LW*1.5+19, RL+LW*2.5+19];

let state='idle', score=0, best=0, speed=3, frame=0;
let roadOffset=0, lineOffset=0;
let cars=[], sparks=[], debris=[], skids=[], citySigns=[];
const player={x:W/2,y:H-120,w:40,h:72,vx:0,angle:0,crashed:false};
const keys={};

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if((e.key===' '||e.key==='Enter')&&state!=='play'){
    if(document.getElementById('screen-game').style.display!=='none') resumeOrStart();
  }
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

function resumeOrStart(){
  if(state==='crashed'){
    state='play'; player.crashed=false; player.angle=0; player.vx=0;
    player.x=W/2; player.y=H-120; msgEl.textContent='';
    requestAnimationFrame(loop);
  } else { startGame(); }
}

function startGame(){
  state='play'; score=0; speed=3; frame=0;
  Object.assign(player,{x:W/2,y:H-120,vx:0,angle:0,crashed:false});
  cars=[]; sparks=[]; debris=[]; skids=[]; citySigns=[];
  roadOffset=0; lineOffset=0; nextCityIdx=1;
  msgEl.textContent='';
  document.getElementById('score').textContent=0;
  updateRouteBar(0);
  announceEl.classList.remove('show');
  showCity(ROUTE[0], false);
  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════════
//  ALGORITMUS SPAWNU AUT — zaručuje kličkování
//  Logika: každé "vlně" (skupině aut) je náhodně
//  zablokovaný jeden pruh a zbylé dva obsazeny.
//  To nutí hráče přejet do volného pruhu.
//  Střídají se s mezerou, aby bylo kdy reagovat.
// ══════════════════════════════════════════════════
let waveTimer = 0;          // kdy spawnovat další vlnu
let waveInterval = 90;      // framy mezi vlnami (zmenšuje se se speed)
let lastBlockedLane = -1;   // volný pruh z minulé vlny

function spawnWave(){
  // Zvol volný pruh — ne stejný jako minule, aby hráč musel skutečně kličkovat
  let freeLane;
  do { freeLane = Math.floor(Math.random()*3); } while(freeLane===lastBlockedLane);
  lastBlockedLane = freeLane;

  const col = NPC_COLORS[Math.floor(Math.random()*NPC_COLORS.length)];

  // Obsaď zbývající dva pruhy auty, s malým rozestupem v Y
  for(let i=0;i<3;i++){
    if(i===freeLane) continue;
    const offset = (Math.random()-0.5)*40; // malá náhodná Y odchylka
    cars.push({
      x: LANES[i],
      y: -80 + offset,
      w:38, h:64,
      color: NPC_COLORS[Math.floor(Math.random()*NPC_COLORS.length)],
      spd: speed*(0.3+Math.random()*0.35),
      crashed:false, angle:0, spinDir:0
    });
  }
}

// ══════════════════════════════════════════════════
//  CEDULE MĚST
// ══════════════════════════════════════════════════
function spawnCitySign(city){
  for(const side of['left','right']){
    citySigns.push({x:side==='left'?RL-38:RR+38, y:-70, name:city.name, emoji:city.emoji, side});
  }
}

function drawCitySign(s){
  ctx.save(); ctx.translate(s.x,s.y);
  // tyč
  ctx.strokeStyle='rgba(255,255,255,0.75)'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,32); ctx.stroke();
  // kulička
  ctx.fillStyle='#f5d76e';
  ctx.shadowColor='rgba(255,210,60,0.9)'; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  // tabulka
  const tw=74, th=26, tx=(s.side==='left')?-tw-6:6;
  ctx.fillStyle='rgba(15,8,35,0.9)';
  ctx.strokeStyle='rgba(200,160,42,0.85)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(tx,-th/2,tw,th,4); ctx.fill(); ctx.stroke();
  // text
  ctx.fillStyle='#ffe680'; ctx.font='bold 10px Georgia';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(s.emoji+' '+s.name, tx+tw/2, 0);
  ctx.restore();
}

// ══════════════════════════════════════════════════
//  KRESLENÍ SILNICE
// ══════════════════════════════════════════════════
function drawRoad(){
  ctx.fillStyle='#2c2c2c'; ctx.fillRect(RL,0,RW,H);
  ctx.fillStyle='#c8a02a'; ctx.fillRect(RL-4,0,4,H); ctx.fillRect(RR,0,4,H);
  ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(RL,0,3,H); ctx.fillRect(RR-3,0,3,H);
  ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.setLineDash([36,28]); ctx.lineWidth=2.5;
  for(let l=1;l<=2;l++){
    ctx.beginPath(); ctx.lineDashOffset=-(lineOffset%64);
    ctx.moveTo(RL+LW*l,0); ctx.lineTo(RL+LW*l,H); ctx.stroke();
  }
  ctx.setLineDash([]);
  const tH=70,off=roadOffset%tH;
  for(const[sx,sw] of[[0,RL],[RR,W-RR]]){
    for(let ty=-tH+off;ty<H+tH;ty+=tH){
      ctx.fillStyle=(Math.floor((ty-off)/tH)%2===0)?'#383838':'#2e2e2e';
      ctx.fillRect(sx,ty,sw,tH);
    }
  }
  // světelný odlesk hráče
  const glow=ctx.createRadialGradient(player.x,player.y-30,0,player.x,player.y-30,200);
  glow.addColorStop(0,'rgba(180,120,255,0.12)'); glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow; ctx.fillRect(RL,0,RW,H);
}

// ══════════════════════════════════════════════════
//  LAMBORGHINI HRÁČE
// ══════════════════════════════════════════════════
function drawLambo(x,y,angle,crashed){
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  const hw=20,hh=36;
  // stín
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(2,hh+4,hw*0.9,7,0,0,Math.PI*2); ctx.fill();
  // podvozek
  ctx.fillStyle='#1a0a2e'; ctx.beginPath(); ctx.roundRect(-hw,-hh,40,72,5); ctx.fill();
  // karoserie
  const bg=ctx.createLinearGradient(-hw,-hh,hw,hh*0.3);
  if(crashed){bg.addColorStop(0,'#5a3060');bg.addColorStop(0.4,'#7a3080');bg.addColorStop(1,'#3a1840');}
  else{bg.addColorStop(0,'#a040c8');bg.addColorStop(0.35,'#cc55ee');bg.addColorStop(0.65,'#9930bb');bg.addColorStop(1,'#5a1880');}
  ctx.fillStyle=bg; ctx.beginPath(); ctx.roundRect(-hw+1,-hh+2,38,68,4); ctx.fill();
  // lesk
  const sh=ctx.createLinearGradient(-hw,-hh,-hw*0.1,hh);
  sh.addColorStop(0,'rgba(255,255,255,0.22)'); sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sh; ctx.beginPath(); ctx.roundRect(-hw+1,-hh+2,22,68,4); ctx.fill();
  // čelní sklo
  ctx.fillStyle='rgba(100,200,255,0.35)';
  ctx.beginPath(); ctx.moveTo(-hw*0.65,-hh+14); ctx.lineTo(hw*0.65,-hh+14); ctx.lineTo(hw*0.5,-hh+30); ctx.lineTo(-hw*0.5,-hh+30); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.beginPath(); ctx.moveTo(-hw*0.55,-hh+15); ctx.lineTo(-hw*0.1,-hh+15); ctx.lineTo(-hw*0.15,-hh+28); ctx.lineTo(-hw*0.6,-hh+28); ctx.closePath(); ctx.fill();
  // zadní okno
  ctx.fillStyle='rgba(80,160,200,0.3)';
  ctx.beginPath(); ctx.moveTo(-hw*0.6,hh-30); ctx.lineTo(hw*0.6,hh-30); ctx.lineTo(hw*0.45,hh-14); ctx.lineTo(-hw*0.45,hh-14); ctx.closePath(); ctx.fill();
  // přední světla
  ctx.fillStyle=crashed?'#553300':'#e8f4ff';
  ctx.shadowColor=crashed?'transparent':'rgba(150,220,255,0.9)'; ctx.shadowBlur=crashed?0:10;
  ctx.beginPath(); ctx.roundRect(-hw+2,-hh+3,11,5,2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(hw-13,-hh+3,11,5,2); ctx.fill(); ctx.shadowBlur=0;
  // zadní světla
  ctx.fillStyle=crashed?'#330000':'#ff1a1a';
  ctx.shadowColor=crashed?'transparent':'rgba(255,40,40,0.8)'; ctx.shadowBlur=crashed?0:8;
  ctx.beginPath(); ctx.roundRect(-hw+2,hh-8,12,5,2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(hw-14,hh-8,12,5,2); ctx.fill(); ctx.shadowBlur=0;
  // logo
  ctx.fillStyle='#f5d76e'; ctx.font='bold 9px Georgia'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('𝐋',0,-hh+9);
  // kola
  for(const[kx,ky] of[[-hw+2,-hh+10],[hw-7,-hh+10],[-hw+2,hh-17],[hw-7,hh-17]]){
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.roundRect(kx,ky,5,14,2); ctx.fill();
    ctx.fillStyle='#555'; ctx.beginPath(); ctx.roundRect(kx+1,ky+1,3,12,1); ctx.fill();
  }
  if(crashed){ctx.fillStyle='rgba(80,80,80,0.3)';ctx.beginPath();ctx.ellipse(0,0,hw*1.4,hh*1.2,0,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}

// ══════════════════════════════════════════════════
//  NPC AUTA
// ══════════════════════════════════════════════════
const NPC_COLORS=[
  {body:'#c0392b',roof:'#922b21',glass:'rgba(255,100,80,0.3)'},
  {body:'#1a7a3a',roof:'#145e2c',glass:'rgba(80,255,120,0.25)'},
  {body:'#2471a3',roof:'#1a5276',glass:'rgba(80,160,255,0.3)'},
  {body:'#d4ac0d',roof:'#b7950b',glass:'rgba(255,220,60,0.3)'},
  {body:'#6c3483',roof:'#512e5f',glass:'rgba(180,80,255,0.3)'},
];
function drawNpcCar(x,y,color,crashed,angle){
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle||0);
  const hw=19,hh=32;
  ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.beginPath(); ctx.ellipse(1,hh+3,hw*0.85,6,0,0,Math.PI*2); ctx.fill();
  const bg=ctx.createLinearGradient(-hw,-hh,hw,hh*0.4);
  bg.addColorStop(0,crashed?'#444':color.body); bg.addColorStop(0.5,crashed?'#333':color.roof); bg.addColorStop(1,crashed?'#222':color.body);
  ctx.fillStyle=bg; ctx.beginPath(); ctx.roundRect(-hw,-hh,38,64,5); ctx.fill();
  const sh=ctx.createLinearGradient(-hw,-hh,-hw*0.05,hh);
  sh.addColorStop(0,'rgba(255,255,255,0.18)'); sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sh; ctx.beginPath(); ctx.roundRect(-hw+1,-hh+2,19,60,4); ctx.fill();
  ctx.fillStyle=color.glass;
  ctx.beginPath(); ctx.moveTo(-hw*0.6,-hh+12); ctx.lineTo(hw*0.6,-hh+12); ctx.lineTo(hw*0.48,-hh+27); ctx.lineTo(-hw*0.48,-hh+27); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-hw*0.55,hh-28); ctx.lineTo(hw*0.55,hh-28); ctx.lineTo(hw*0.42,hh-13); ctx.lineTo(-hw*0.42,hh-13); ctx.closePath(); ctx.fill();
  ctx.fillStyle=crashed?'#222':'#ffeecc';
  ctx.shadowColor=crashed?'transparent':'rgba(255,240,180,0.7)'; ctx.shadowBlur=crashed?0:8;
  ctx.beginPath(); ctx.roundRect(-hw+2,-hh+3,10,4,1); ctx.fill();
  ctx.beginPath(); ctx.roundRect(hw-12,-hh+3,10,4,1); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle=crashed?'#330000':'#ff3300';
  ctx.shadowColor=crashed?'transparent':'rgba(255,60,0,0.7)'; ctx.shadowBlur=crashed?0:6;
  ctx.beginPath(); ctx.roundRect(-hw+2,hh-7,10,4,1); ctx.fill();
  ctx.beginPath(); ctx.roundRect(hw-12,hh-7,10,4,1); ctx.fill(); ctx.shadowBlur=0;
  for(const[kx,ky] of[[-hw+2,-hh+9],[hw-7,-hh+9],[-hw+2,hh-16],[hw-7,hh-16]]){
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.roundRect(kx,ky,5,13,2); ctx.fill();
    ctx.fillStyle='#444'; ctx.beginPath(); ctx.roundRect(kx+1,ky+1,3,11,1); ctx.fill();
  }
  ctx.restore();
}

// ══════════════════════════════════════════════════
//  ČÁSTICOVÉ EFEKTY
// ══════════════════════════════════════════════════
function addCrashEffect(x,y,color){
  for(let i=0;i<30;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*6;sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,color:['#ffcc00','#ff8800','#ff4400','#fff','#ffee88'][Math.floor(Math.random()*5)],size:1.5+Math.random()*3});}
  for(let i=0;i<12;i++){const a=Math.random()*Math.PI*2,s=0.5+Math.random()*3;debris.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:1,w:3+Math.random()*8,h:2+Math.random()*5,color,angle:Math.random()*Math.PI*2,rot:Math.random()*0.3-0.15});}
  skids.push({x,y,life:1.0});
}
function drawParticles(){
  skids=skids.filter(s=>s.life>0);
  for(const s of skids){ctx.globalAlpha=s.life*0.4;ctx.fillStyle='#111';ctx.beginPath();ctx.ellipse(s.x,s.y,22,8,0,0,Math.PI*2);ctx.fill();s.life-=0.008;}
  debris=debris.filter(d=>d.life>0);
  for(const d of debris){ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.angle);ctx.globalAlpha=d.life;ctx.fillStyle=d.color;ctx.beginPath();ctx.roundRect(-d.w/2,-d.h/2,d.w,d.h,1);ctx.fill();ctx.restore();d.x+=d.vx;d.y+=d.vy;d.vy+=0.15;d.vx*=0.95;d.angle+=d.rot;d.life-=0.018;}
  sparks=sparks.filter(s=>s.life>0);
  for(const s of sparks){ctx.globalAlpha=s.life;ctx.fillStyle=s.color;ctx.beginPath();ctx.arc(s.x,s.y,s.size*s.life,0,Math.PI*2);ctx.fill();s.x+=s.vx;s.y+=s.vy;s.vy+=0.12;s.vx*=0.97;s.life-=0.03;}
  ctx.globalAlpha=1;
}

function collides(a,b){return Math.abs(a.x-b.x)<(a.w+b.w)/2-5&&Math.abs(a.y-b.y)<(a.h+b.h)/2-6;}

// ══════════════════════════════════════════════════
//  HLAVNÍ SMYČKA
// ══════════════════════════════════════════════════
function loop(){
  if(state!=='play'&&state!=='crashed') return;
  frame++;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,0,W,H);

  speed = 3 + score*0.003;
  if(state==='play'){ roadOffset+=speed*1.1; lineOffset+=speed*1.1; }

  drawRoad();
  drawParticles();

  // Pohyb hráče
  if(state==='play'){
    const ac=(keys['ArrowLeft']||keys['a']||keys['A'])?-0.4:(keys['ArrowRight']||keys['d']||keys['D'])?0.4:0;
    const bo=(keys['ArrowUp']||keys['w']||keys['W'])?1.6:1;
    player.vx+=ac; player.vx*=0.84; player.x+=player.vx*bo;
    player.x=Math.max(RL+player.w/2+2,Math.min(RR-player.w/2-2,player.x));
    player.angle=player.vx*0.04;
  }

  // ── Spawn vln aut ──────────────────────────────
  if(state==='play'){
    waveTimer--;
    if(waveTimer<=0){
      spawnWave();
      // interval se zkracuje se speed, ale ne pod 55 framů
      waveInterval = Math.max(55, 110 - Math.floor(speed*8));
      waveTimer = waveInterval;
    }
  }

  // ── NPC update ─────────────────────────────────
  for(const car of cars){
    if(!car.crashed) car.y+=speed-car.spd+speed*0.35;
    else{ car.y+=1.5; car.angle+=car.spinDir; }
    drawNpcCar(car.x,car.y,car.color,car.crashed,car.angle);
    if(state==='play'&&!car.crashed&&collides(player,car)){
      car.crashed=true; car.spinDir=(Math.random()>0.5?1:-1)*0.08;
      addCrashEffect((player.x+car.x)/2,(player.y+car.y)/2,car.color.body);
      score=Math.max(0,score-300);
      state='crashed'; player.crashed=true;
      msgEl.textContent='💥 Náraz! −300 bodů — pokračuješ dál...';
      setTimeout(()=>{if(state==='crashed'){state='play';player.crashed=false;player.angle=0;msgEl.textContent='';}},1400);
    }
  }
  cars=cars.filter(c=>c.y<H+160);

  // ── Cedule měst ────────────────────────────────
  for(const s of citySigns) s.y+=speed*1.1;
  for(const s of citySigns) drawCitySign(s);
  citySigns=citySigns.filter(s=>s.y<H+90);

  // ── Skóre + kontrola trasy ─────────────────────
  if(state==='play'){
    score++;
    document.getElementById('score').textContent=score;
    updateRouteBar(score);
    if(score>best){best=score;document.getElementById('best').textContent=best;}

    if(nextCityIdx<ROUTE.length && score>=ROUTE[nextCityIdx].score){
      const city=ROUTE[nextCityIdx];
      const isGoal=(city.name==='Praha');
      showCity(city, isGoal);
      spawnCitySign(city);
      nextCityIdx++;
      if(isGoal){
        state='win';
        msgEl.textContent='🏆 Dojel jsi do Prahy! Gratulace! Skóre: '+score;
        document.getElementById('hint').textContent='Mezerník = hrát znovu';
        return;
      }
    }
  }

  drawLambo(player.x,player.y,player.angle,player.crashed);
  requestAnimationFrame(loop);
}

// ── Idle smyčka ────────────────────────────────────
(function idle(){
  if(document.getElementById('screen-game').style.display==='none'){requestAnimationFrame(idle);return;}
  if(state!=='idle') return;
  ctx.clearRect(0,0,W,H); ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,0,W,H);
  roadOffset+=1.2; lineOffset+=1.2; drawRoad();
  drawLambo(W/2,H-120,0,false);
  msgEl.textContent='Stiskni Mezerník pro start';
  requestAnimationFrame(idle);
})();
</script>
